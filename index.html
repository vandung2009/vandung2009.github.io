<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #2b2b2b, #1a1a1a);
      color: #ffd700; /* Màu vàng */
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #ffd700;
      object-fit: cover;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 3em;
      margin: 10px 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h2 {
      font-size: 1.5em;
      font-weight: 300;
      margin-bottom: 30px;
    }

    p {
      font-size: 1.1em;
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 20px;
    }

    .social-links {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .social-links a {
      color: #ffd700;
      text-decoration: none;
      font-size: 1.5em;
      transition: color 0.3s ease;
    }

    .social-links a:hover {
      color: #ffffff; /* Hiệu ứng khi hover */
    }

    footer {
      margin-top: 50px;
      font-size: 0.9em;
      color: #888;
    }

    footer a {
      color: #ffd700;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-img">
    <h1>Họ Tên</h1>
    <h2>Vị trí công việc (Ví dụ: Developer, Designer)</h2>
    <p>Chào mừng bạn đến với profile của tôi! Tôi là một người đam mê sáng tạo và luôn sẵn sàng học hỏi những điều mới. Liên hệ với tôi để hợp tác!</p>
    <div class="social-links">
      <a href="#" target="_blank">Facebook</a>
      <a href="#" target="_blank">LinkedIn</a>
      <a href="#" target="_blank">GitHub</a>
    </div>
  </div>
  <footer>
    © 2025 <a href="#">Họ Tên</a>. All rights reserved.
  </footer>
</body>
</html>
