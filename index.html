<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vandung bio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            animation: fadeIn 1s ease-in;
        }

        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #fff;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .bio-text {
            text-align: center;
            margin: 30px 0;
            padding: 0 20px;
        }

        .social-links {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #fff;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background-color: #fff;
            color: #000;
        }

        .music-player {
            margin: 40px auto;
            width: 300px;
            display: block;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            border-top: 1px solid #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">

            <img src="https://raw.githubusercontent.com/vandung2009/vandung2009.github.io/refs/heads/main/avatar.jpg" alt="Vandung's Avatar" class="avatar">

Thì tất nhiên suy nghĩ, niềm tin giá trị sẽ khác nhau</p>
        <div class="bio-text">

        </div>

        <ul class="social-links">
            <li><a href="https://t.me/xyzvandung" target="_blank">Telegram</a></li>
    
        </ul>

        <footer>
            <p> @xyzvandung </p>
            <p> vandung2009.github.io</p>

    </div>

      </header>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lượt Xem Hồ Sơ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        .view-container {
            text-align: center;
        }
        .view-count {
            font-size: 24px;
            font-weight: bold;
            background-color: #e7e7e7;
            padding: 10px;
            border-radius: 5px;
        }
        .icon {
            font-size: 18px; /* Giảm kích thước icon */
            margin-top: 20px;
            cursor: pointer;
        }
        .footer {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 18px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="view-container">
        <div class="view-count">
            Lượt xem hồ sơ: <span id="view-count">0</span>
        </div>
    </div>

    <!-- Icon nằm ở cuối -->
    <div class="footer">
        <span class="icon">&#128065; Lượt xem</span> <!-- Dùng emoji làm icon -->
    </div>

    <script>
        // Lấy phần tử chứa số lượt xem
        const viewCountElement = document.getElementById('view-count');
        
        // Lấy giá trị lượt xem hiện tại (hoặc từ LocalStorage nếu có)
        let viewCount = localStorage.getItem('viewCount') ? parseInt(localStorage.getItem('viewCount')) : 0;

        // Cập nhật giá trị lượt xem
        viewCount++;
        
        // Hiển thị lại số lượt xem trên trang
        viewCountElement.textContent = viewCount;

        // Lưu lại giá trị lượt xem vào LocalStorage
        localStorage.setItem('viewCount', viewCount);
    </script>

</body>
</html>
