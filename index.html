<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vandung's Bio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #fff;
            object-fit: cover;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .bio-text {
            margin-bottom: 30px;
        }

        .social-links {
            list-style: none;
        }

        .social-links li {
            margin: 10px 0;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #cccccc;
        }

        .music-player {
            margin: 30px 0;
            width: 100%;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <!-- Thay thế avatar.jpg bằng đường dẫn ảnh của bạn -->
            <img src="avatar.jpg" alt="Vandung's Avatar" class="avatar">
            <h1>VANDUNG</h1>
            <p> Chào 😊</p>
        </header>
        <!-- Trình phát nhạc -->
        <audio controls class="music-player">
            <!-- Thay thế music.mp3 bằng đường dẫn file nhạc của bạn -->
            <source src="music.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ phát nhạc
        </audio>

        <div class="bio-text">
            <p>Xin chào! Tôi là vandung
        </div>

        <ul class="social-links">
            <li><a href="https://facebook.com/yourprofile" target="_blank">Facebook</a></li>
            <li><a href="https://github.com/yourusername" target="_blank">GitHub</a></li>
            <li><a href="https://instagram.com/yourhandle" target="_blank">Instagram</a></li>
            <li><a href="mailto:youremail@example.com">Email</a></li>
        </ul>

        <footer>
            <p>© 2024 vandung. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
