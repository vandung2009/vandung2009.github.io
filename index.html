<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Profile 3 Trang</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <button class="nav-btn" onclick="showPage('profile')">Profile</button>
                <button class="nav-btn" onclick="showPage('social')">Mạng Xã Hội + Game</button>
                <button class="nav-btn" onclick="showPage('apps')">Apps & Links</button>
            </nav>
        </header>
        <main>
            <!-- Trang 1: Profile -->
            <section id="profile" class="page active">
                <h1>Profile</h1>
                <p>Tên: Nguyễn Văn A</p>
                <p>Tuổi: 25</p>
                <p>Giới thiệu: Đam mê công nghệ và phát triển phần mềm.</p>
            </section>

            <!-- Trang 2: Mạng Xã Hội + Game -->
            <section id="social" class="page">
                <h1>Mạng Xã Hội & Game</h1>
                <ul>
                    <li><a href="https://facebook.com" target="_blank">Facebook</a></li>
                    <li><a href="https://instagram.com" target="_blank">Instagram</a></li>
                    <li><a href="https://steamcommunity.com" target="_blank">Steam</a></li>
                </ul>
            </section>

            <!-- Trang 3: Apps & Links -->
            <section id="apps" class="page">
                <h1>Apps & Links</h1>
                <ul>
                    <li><a href="https://github.com" target="_blank">GitHub</a></li>
                    <li><a href="https://notion.so" target="_blank">Notion</a></li>
                    <li><a href="https://drive.google.com" target="_blank">Google Drive</a></li>
                </ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
