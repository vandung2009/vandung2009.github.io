<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vandung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            animation: fadeIn 1s ease-in;
        }

        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #fff;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .bio-text {
            text-align: center;
            margin: 30px 0;
            padding: 0 20px;
        }

        .social-links {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #fff;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background-color: #fff;
            color: #000;
        }

        .music-player {
            margin: 40px auto;
            width: 300px;
            display: block;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            border-top: 1px solid #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="https://raw.githubusercontent.com/vandung2009/vandung2009.github.io/refs/heads/main/avatar.jpg" alt="Vandung's Avatar" class="avatar">
            <h1>XYZVANDUNG</h1>
            <p>Xuất thân khác nhau, trải nghiệm khác nhau, hoàn cảnh khác nhau.
Thì tất nhiên suy nghĩ, niềm tin giá trị sẽ khác nhau</p>
        <div class="bio-text">
            <p>Xin chào! Tôi là vandung</>
        </div>

        <ul class="social-links">
            <li><a href="https://t.me/xyzvandung" target="_blank">Telegram</a></li>
    
        </ul>

        <footer>
            <p> @xyzvandung </p>
            <p> vandung2009.github.io</p>
        </footer>
    </div>

      </header>
        <audio controls class="music-player" id="mainAudio">
            <source src="https://github.com/vandung2009/vandung2009.github.io/raw/refs/heads/main/music.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ phát nhạc
        </audio>
    <script>
        // Xử lý autoplay nhạc sau khi click
        document.addEventListener('click', function() {
            const audio = document.getElementById('mainAudio');
            audio.play().catch(error => {
                console.log('Cần tương tác người dùng để phát nhạc');
            });
        });
    </script>
</body>
</html>
