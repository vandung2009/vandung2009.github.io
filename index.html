<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiển thị thông tin</title>
    <style>
        body {
            background-color: #1e1e1e; /* Nền đen xám */
            color: aqua; /* Phông chữ màu aqua */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .info {
            margin: 10px 0;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="info" id="time">Time:</div>
    <div class="info" id="fps">FPS:</div>
    <div class="info" id="ip">IP:</div>

    <script>
        // Cập nhật thời gian thực
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            const dateString = now.toLocaleDateString();
            document.getElementById('time').textContent = `: ${timeString}, : ${dateString}`;
        }

        // Cập nhật FPS
        let lastFrame = performance.now();
        let fpsDisplay = document.getElementById('fps');

        function updateFPS() {
            const currentFrame = performance.now();
            const fps = Math.round(1000 / (currentFrame - lastFrame));
            lastFrame = currentFrame;
            fpsDisplay.textContent = `FPS: ${fps}`;
            requestAnimationFrame(updateFPS);
        }

        // Lấy địa chỉ IP người dùng
        async function fetchIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('ip').textContent = `IP: ${data.ip}`;
            } catch (error) {
                document.getElementById('ip').textContent = 'Không thể lấy địa chỉ IP';
            }
        }

        // Gọi các hàm
        setInterval(updateTime, 1000);
        updateFPS();
        fetchIP();
    </script>
</body>
</html>
